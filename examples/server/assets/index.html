<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Welcome to simple Web Page</h1>
        <p>This is a simple web page that includes a PNG image.</p>
        <img src="image.png" alt="A sample PNG image" class="centered-image">
        <div>
            Index:
            <span id="timeDisplay">Loading...</span>
        </div>
        <a href="/home">Home page</a>
    </div>

    <script>
        const timeDisplay = document.getElementById('timeDisplay');
        let ws = null;

        // Initialize WebSocket connection
        function initWebSocket() {
            try {
                // Connect to WebSocket server (assuming it's on the same origin)
                ws = new WebSocket(`ws://${window.location.host}/ws`);

                ws.onopen = function (event) {
                    console.log('WebSocket connected');
                    const message = {
                        type: "websocket",
                        timestamp: Date.now()
                    };

                    ws.send(JSON.stringify(message));
                };

                ws.onmessage = function (event) {
                    // Handle incoming messages
                    const data = JSON.parse(event.data);
                    // console.log('WebSocket message:', data);
                    // if (data.type === 'time_update') {
                    timeDisplay.textContent = new Date(data.time).toLocaleString('de-DE', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });
                    // timeDisplay.textContent = new Date(data.timestamp).toISOString().split('T')[0];
                    // }
                };

                ws.onclose = function (event) {
                    console.log('WebSocket disconnected');
                    // Attempt to reconnect after 3 seconds
                    // setTimeout(initWebSocket, 3000);
                };

                ws.onerror = function (error) {
                    console.error('WebSocket error:', error);
                };
            } catch (error) {
                console.error('Failed to initialize WebSocket:', error);
            }
        }

        async function updateServerTime(value) {
            try {
                const response = await fetch(`/api/v1/inc/${value}`);
                const data = await response.json();
                value = data.value;
                timeDisplay.textContent = value;
                setTimeout(() => updateServerTime(data.value), 5000);
            } catch (error) {
                console.error('Error fetching server time:', error);
                timeDisplay.textContent = 'Error';
                value = 0;
            }
            // Update immediately and then every second
            setTimeout(() => updateServerTime(value), 1000 * 60);
        }

        // Initialize WebSocket connection
        initWebSocket();

        // updateServerTime(0);        
    </script>
</body>

</html>
