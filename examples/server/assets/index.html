<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web template" />
    <title>Simple Web Page</title>
    <link rel="stylesheet" href="styles.css">

    <script src="/js/htmx.min.js"></script>
    <script src="/js/hx-ws.js"></script>
    <script src="/js/hx-sse.js"></script>
</head>

<body>
    <div class="container">
        <h1>Welcome to simple Web Page</h1>
        <p>This is a simple web page that includes a PNG image.</p>

        <!-- Auto-connects on load, streams messages into the div -->
        <div hx-sse:connect="/stream" hx-target="#count">
            <span>Count: </span> <span id="count">Waiting for messages...</span>
        </div>

        <div hx-ws:connect="/wstime" hx-target="#wstime" hx-swap="outerHTML">
            <div id="wstime">Waiting for messages...</div>
        </div>

        <img src="image.png" width="100" alt="A sample PNG image" class="centered-image">
        <a href="/home">Home page</a>
    </div>

    <script>

        document.addEventListener('htmx:after:ws:connection', (e) => {
            console.log(e.detail.connection);
            if (e.detail.connection.url.includes('/wstime')) {
                let ws = e.detail.connection.socket;
                const message = {
                    type: "websocket",
                    timestamp: Date.now()
                };

                ws.send(JSON.stringify(message));
            }
        });

        document.addEventListener('htmx:ws:close', (e) => {
            console.log('Disconnected from', e.detail.connection.url, 'reason:', e.detail.reason);
        });
    </script>
</body>

</html>
