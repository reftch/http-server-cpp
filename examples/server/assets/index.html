<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web template" />
    <title>Simple Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Welcome to simple Web Page</h1>
        <p>This is a simple web page that includes a PNG image.</p>
        <img src="image.png" alt="A sample PNG image" class="centered-image">
        <div>
            Index:
            <span id="timeDisplay">No info</span>
            <div>
                <div>
                    <button id="connect-btn"></button>
                </div>
                <div>
                    <button id="sse-btn"></button>
                </div>
            </div>
        </div>
        <a href="/home">Home page</a>
    </div>

    <script>
        let ws = null;

        const timeDisplay = document.getElementById('timeDisplay');
        const connectBtn = document.getElementById('connect-btn');
        connectBtn.innerText = "Connect WS";

        const sseBtn = document.getElementById('sse-btn');
        sseBtn.innerText = "Connect SSE";

        connectBtn.addEventListener('click', toggleConnection);
        sseBtn.addEventListener('click', toggleSSEConnection);

        let eventSource = null;

        function getDate(str) {
            return new Date(str).toLocaleString('de-DE', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
            });
        }

        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                console.log(ws)
                ws.close(1000, "Client initiated disconnect");
                connectBtn.innerText = "Connect WS";
            } else {
                initWebSocket();
            }
        }

        function toggleSSEConnection() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                console.log("SSE connection closed");
                sseBtn.innerText = "Connect SSE";
            } else {
                sseConnection();
            }
        }

        function sseConnection() {
            eventSource = new EventSource("/events");

            eventSource.onopen = () => {
                console.log("SSE connection opened");
                sseBtn.innerText = "Disconnect SSE";
            };

            eventSource.onmessage = (event) => {
                // console.log("Received:", event.data);
                if (event.data && event.data !== 'connected') {
                    const data = JSON.parse(event.data);
                    timeDisplay.textContent = getDate(data.time);
                }
            };

            eventSource.onerror = (error) => {
                console.error("SSE error:", error);
            };

            eventSource.addEventListener("time", e => {
                console.log(JSON.parse(e.data));
            });
        }

        function disconnectSSE() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                console.log("SSE connection closed");
            }
        }

        // Initialize WebSocket connection
        function initWebSocket() {
            try {
                // Connect to WebSocket server (assuming it's on the same origin)
                const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
                ws = new WebSocket(
                    `${wsScheme}://${window.location.host}/ws?token=12345`
                );

                ws.onopen = function (event) {
                    console.log('WebSocket connected');
                    connectBtn.innerText = "Disconnect WS";

                    const message = {
                        type: "websocket",
                        timestamp: Date.now()
                    };

                    ws.send(JSON.stringify(message));
                };

                ws.onmessage = function (event) {
                    // Handle incoming messages
                    if (event.data) {
                        const data = JSON.parse(event.data);
                        timeDisplay.textContent = getDate(data.time);
                    }
                };

                ws.onclose = function (event) {
                    console.log('WebSocket disconnected');
                };

                ws.onerror = function (error) {
                    // console.error('WebSocket error:', error);
                };
            } catch (error) {
                console.error('Failed to initialize WebSocket:', error);
            }
        }

        async function updateServerTime(value) {
            try {
                const response = await fetch(`/api/v1/inc/${value}`);
                const data = await response.json();
                value = data.value;
                timeDisplay.textContent = value;
                setTimeout(() => updateServerTime(data.value), 5000);
            } catch (error) {
                console.error('Error fetching server time:', error);
                timeDisplay.textContent = 'Error';
                value = 0;
            }
            // Update immediately and then every second
            setTimeout(() => updateServerTime(value), 1000 * 60);
        }


        // Initialize WebSocket connection
        // initWebSocket();

        // updateServerTime(0);        
    </script>
</body>

</html>
