<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta5/dist/htmx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta5/dist/ext/hx-ws.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta5/dist/ext/hx-sse.js"></script>
</head>

<body>
    <div class="container">
        <h1>Home page</h1>

        <!-- Auto-connects on load, streams messages into the div -->
        <div hx-sse:connect="/stream" hx-target="#count">
            <span>Count: </span> <span id="count">Waiting for messages...</span>
        </div>

        <a href="/">Start page</a>
    </div>

</body>

</html>
